services:
  openclaw-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - openclaw-data:/root/.openclaw-${OPENCLAW_PROFILE:-company}
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dashboard
    restart: unless-stopped
    env_file: ../.env
    environment:
      ORCHESTRATOR_ENABLED: "${ORCHESTRATOR_ENABLED:-0}"
    volumes:
      - openclaw-data:/root/.openclaw-${OPENCLAW_PROFILE:-company}
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-8788}:8788"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - GATEWAY_PORT=${GATEWAY_PORT:-3000}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-8788}
    depends_on:
      - openclaw-gateway
      - dashboard

volumes:
  openclaw-data:
  caddy-data:
  caddy-config:
