name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Shell syntax check
        run: |
          bash -n scripts/_common.sh
          bash -n scripts/install.sh
          bash -n scripts/install-cron.sh
          bash -n scripts/bootstrap.sh
          bash -n scripts/launch.sh
          bash -n scripts/start.sh
          bash -n scripts/stop.sh
          bash -n scripts/healthcheck.sh
          bash -n scripts/watchdog.sh
          bash -n scripts/onboard-wrapper.sh
          bash -n scripts/backup.sh
          bash -n scripts/restore.sh
          bash -n scripts/demo-up.sh
          bash -n scripts/demo-down.sh
          bash -n scripts/release-check.sh
          bash -n docker/entrypoint.sh

      - name: ShellCheck lint
        run: |
          sudo apt-get install -y shellcheck
          shellcheck -x -S error scripts/*.sh docker/entrypoint.sh

      - name: Python syntax check
        run: |
          python3 -m py_compile dashboard/rd-dashboard/dashboard_data.py
          python3 -m py_compile scripts/control_server.py
          for f in engine/*.py; do python3 -m py_compile "$f"; done
          find server -name '*.py' -exec python3 -m py_compile {} +

      - name: Python lint (ruff)
        run: |
          pip install ruff
          ruff check --select=E,F engine/ server/ scripts/control_server.py dashboard/rd-dashboard/dashboard_data.py --ignore=E501,E402

      - name: JSON validation (all templates)
        run: |
          jq -e . templates/jobs.template.json >/dev/null
          jq -e . templates/workflow-jobs.default.json >/dev/null
          jq -e . templates/workflow-jobs.requirement-review.json >/dev/null
          jq -e . templates/workflow-jobs.bugfix.json >/dev/null
          jq -e . templates/workflow-jobs.release-retro.json >/dev/null
          jq -e . templates/workflow-jobs.code-sprint.json >/dev/null
          jq -e . templates/workflow-jobs.incident-response.json >/dev/null
          jq -e . templates/workflow-jobs.feature-delivery.json >/dev/null
          jq -e . templates/company-project.template.json >/dev/null
          jq -e . templates/exec-approvals.template.json >/dev/null
          jq -e . docker/demo_data/dashboard-data.json >/dev/null
          jq -e . docker/demo_data/business-metrics.json >/dev/null
          jq -e . engine/role_config.json >/dev/null
          jq -e . engine/review_rules.json >/dev/null
          for f in templates/agents/*/manifest.json; do jq -e . "$f" >/dev/null; done

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install test dependencies
        run: pip install pytest

      - name: Unit tests
        run: |
          python3 -m pytest tests/ -v --tb=short

  smoke:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Smoke tests
        run: |
          python3 -m pytest tests/test_smoke_control_api.py -v --tb=short
