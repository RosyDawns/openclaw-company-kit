<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw 配置中心</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: rgba(255, 255, 255, 0.1);
        --panel-strong: rgba(255, 255, 255, 0.14);
        --text: #eaf1ff;
        --muted: #9fb0d2;
        --accent: #56c2ff;
        --ok: #37d399;
        --warn: #fbbf24;
        --err: #f87171;
        --border: rgba(255, 255, 255, 0.16);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: "SF Pro Display", "PingFang SC", "Noto Sans SC", sans-serif;
        background:
          radial-gradient(80rem 60rem at 10% -10%, #1b3a6f 0%, transparent 55%),
          radial-gradient(70rem 70rem at 100% 0%, #113f55 0%, transparent 54%),
          linear-gradient(160deg, #04070d, #0f1628 40%, #0a101f);
      }

      .wrap {
        width: min(1100px, calc(100% - 32px));
        margin: 24px auto;
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 16px;
      }

      .glass {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        backdrop-filter: blur(16px);
      }

      .side {
        padding: 14px;
        position: sticky;
        top: 16px;
        height: fit-content;
      }

      .side h1 {
        font-size: 18px;
        margin: 0 0 8px;
      }

      .sub {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 12px;
      }

      .steps {
        display: grid;
        gap: 8px;
      }

      .step {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        font-size: 13px;
        color: #c4d6f8;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.02);
      }

      .step.active {
        border-color: rgba(86, 194, 255, 0.8);
        background: rgba(86, 194, 255, 0.15);
        color: #f4f8ff;
      }

      .side .links {
        margin-top: 14px;
        display: grid;
        gap: 8px;
      }

      .main {
        padding: 16px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .status {
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid var(--border);
        color: var(--muted);
      }

      .status.ok { color: var(--ok); border-color: rgba(55, 211, 153, 0.6); }
      .status.warn { color: var(--warn); border-color: rgba(251, 191, 36, 0.6); }
      .status.err { color: var(--err); border-color: rgba(248, 113, 113, 0.6); }

      .card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        background: var(--panel-strong);
        animation: fadeIn 260ms ease;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      h2 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      .hint {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      label {
        font-size: 12px;
        color: #bfd0ef;
      }

      input, select, textarea {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(8, 14, 26, 0.6);
        color: var(--text);
        padding: 10px;
        font-size: 14px;
        outline: none;
      }

      input:focus, select:focus, textarea:focus {
        border-color: rgba(86, 194, 255, 0.8);
        box-shadow: 0 0 0 2px rgba(86, 194, 255, 0.2);
      }

      textarea {
        min-height: 120px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }

      .actions {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button, .btn {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        padding: 9px 12px;
        font-size: 13px;
        text-decoration: none;
        cursor: pointer;
      }

      button.primary {
        border-color: rgba(86, 194, 255, 0.9);
        background: rgba(86, 194, 255, 0.18);
      }

      button.ghost {
        background: transparent;
      }

      .muted {
        color: var(--muted);
        font-size: 12px;
      }

      .split {
        display: grid;
        grid-template-columns: 1fr 280px;
        gap: 10px;
      }

      .service-list {
        display: grid;
        gap: 8px;
      }

      .svc {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px;
        font-size: 12px;
      }

      @media (max-width: 980px) {
        .wrap {
          grid-template-columns: 1fr;
        }
        .side {
          position: static;
        }
        .grid,
        .split {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <aside class="side glass">
        <h1>配置中心</h1>
        <div class="sub">只需一次配置，后续可在这里随时改参数并重启服务。</div>
        <div id="steps" class="steps"></div>
        <div class="links">
          <a class="btn" href="/dashboard/" target="_self">打开驾驶舱</a>
          <button id="btnReloadStatus" type="button">刷新服务状态</button>
        </div>
      </aside>

      <section class="main glass">
        <div class="toolbar">
          <div id="headTitle">加载中...</div>
          <div id="globalStatus" class="status">未执行</div>
        </div>

        <div id="panel"></div>

        <div class="actions">
          <button id="btnPrev" type="button" class="ghost">上一步</button>
          <button id="btnNext" type="button" class="ghost">下一步</button>
          <button id="btnSave" type="button">保存配置</button>
          <button id="btnApply" type="button" class="primary">应用并重启服务</button>
          <button id="btnRestart" type="button">仅重启服务</button>
        </div>
      </section>
    </div>

    <script>
      const steps = [
        { id: "step-port", label: "1) 端口与基础" },
        { id: "step-project", label: "2) 公司与项目" },
        { id: "step-model", label: "3) 模型与密钥" },
        { id: "step-feishu", label: "4) 飞书配置" },
        { id: "step-run", label: "5) 应用与状态" },
      ];

      const modelPresets = {
        keep: "",
        deepseek: "deepseek/deepseek-chat",
        qwen: "qwen/qwen-plus",
        moonshot: "moonshot/moonshot-v1-32k",
        zai: "zai/glm-4-flash",
        minimax: "minimax/minimax-m1",
        custom: "",
      };

      const state = {
        stepIdx: 0,
        config: {},
        taskId: "",
        taskTimer: null,
      };

      function esc(v) {
        return String(v ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function byId(id) {
        return document.getElementById(id);
      }

      function setStatus(text, kind = "") {
        const el = byId("globalStatus");
        el.textContent = text;
        el.className = `status ${kind}`.trim();
      }

      function updateStepNav() {
        byId("steps").innerHTML = steps
          .map((s, idx) => `<div class="step ${idx === state.stepIdx ? "active" : ""}" data-idx="${idx}">${esc(s.label)}</div>`)
          .join("");
        byId("headTitle").textContent = steps[state.stepIdx].label;
      }

      function getVal(id) {
        const el = byId(id);
        return el ? String(el.value || "").trim() : "";
      }

      function fillValue(id, value) {
        const el = byId(id);
        if (el) el.value = value ?? "";
      }

      function collectForm() {
        const cfg = { ...state.config };
        const ids = [
          "OPENCLAW_PROFILE",
          "SOURCE_OPENCLAW_CONFIG",
          "COMPANY_NAME",
          "PROJECT_PATH",
          "PROJECT_REPO",
          "GROUP_ID",
          "FEISHU_HOT_ACCOUNT_ID",
          "FEISHU_HOT_BOT_NAME",
          "FEISHU_HOT_APP_ID",
          "FEISHU_HOT_APP_SECRET",
          "FEISHU_AI_ACCOUNT_ID",
          "FEISHU_AI_BOT_NAME",
          "FEISHU_AI_APP_ID",
          "FEISHU_AI_APP_SECRET",
          "GH_TOKEN",
          "MODEL_PRIMARY",
          "DASHBOARD_PORT",
        ];
        ids.forEach((k) => {
          const v = byId(k);
          if (v) cfg[k] = String(v.value || "").trim();
        });
        return cfg;
      }

      function validateCore(cfg) {
        const miss = [];
        if (!cfg.GROUP_ID) miss.push("GROUP_ID");
        if (!cfg.FEISHU_HOT_APP_ID) miss.push("FEISHU_HOT_APP_ID");
        if (!cfg.FEISHU_HOT_APP_SECRET) miss.push("FEISHU_HOT_APP_SECRET");
        if (!/^\d+$/.test(cfg.DASHBOARD_PORT || "")) miss.push("DASHBOARD_PORT");
        return miss;
      }

      function renderPanel() {
        const c = state.config;

        const panes = {
          "step-port": `
            <article class="card">
              <h2>端口与基础配置</h2>
              <p class="hint">启动脚本只问这一个端口。后续你也可以在这里改并重新应用。</p>
              <div class="grid">
                <div class="field">
                  <label>服务端口 (DASHBOARD_PORT)</label>
                  <input id="DASHBOARD_PORT" inputmode="numeric" value="${esc(c.DASHBOARD_PORT || "8788")}" />
                </div>
                <div class="field">
                  <label>OpenClaw Profile</label>
                  <input id="OPENCLAW_PROFILE" value="${esc(c.OPENCLAW_PROFILE || "company")}" />
                </div>
                <div class="field" style="grid-column:1 / -1;">
                  <label>SOURCE_OPENCLAW_CONFIG (可选)</label>
                  <input id="SOURCE_OPENCLAW_CONFIG" value="${esc(c.SOURCE_OPENCLAW_CONFIG || "~/.openclaw/openclaw.json")}" />
                  <div class="muted">若本机已有 OpenClaw 配置，可指定来源；为空时走默认配置文件。</div>
                </div>
              </div>
            </article>
          `,

          "step-project": `
            <article class="card">
              <h2>公司与项目</h2>
              <p class="hint">这些字段会用于群提示词、驾驶舱展示和脚本自动生成。</p>
              <div class="grid">
                <div class="field">
                  <label>COMPANY_NAME</label>
                  <input id="COMPANY_NAME" value="${esc(c.COMPANY_NAME || "OpenClaw Company")}" />
                </div>
                <div class="field">
                  <label>PROJECT_REPO</label>
                  <input id="PROJECT_REPO" value="${esc(c.PROJECT_REPO || "your-org/your-repo")}" />
                </div>
                <div class="field" style="grid-column:1 / -1;">
                  <label>PROJECT_PATH</label>
                  <input id="PROJECT_PATH" value="${esc(c.PROJECT_PATH || "/path/to/your-project")}" />
                </div>
                <div class="field" style="grid-column:1 / -1;">
                  <label>GROUP_ID (必填)</label>
                  <input id="GROUP_ID" value="${esc(c.GROUP_ID || "")}" placeholder="oc_xxxxxxxxxxxxx" />
                </div>
              </div>
            </article>
          `,

          "step-model": `
            <article class="card">
              <h2>模型与密钥</h2>
              <p class="hint">支持国内模型预设，也支持自定义模型（provider/model）。</p>
              <div class="grid">
                <div class="field">
                  <label>模型预设</label>
                  <select id="MODEL_PRESET">
                    <option value="keep">保持现状（不覆盖）</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="qwen">Qwen / DashScope</option>
                    <option value="moonshot">Moonshot (Kimi)</option>
                    <option value="zai">ZAI (GLM)</option>
                    <option value="minimax">MiniMax</option>
                    <option value="custom">自定义</option>
                  </select>
                </div>
                <div class="field">
                  <label>MODEL_PRIMARY</label>
                  <input id="MODEL_PRIMARY" value="${esc(c.MODEL_PRIMARY || "")}" placeholder="如 deepseek/deepseek-chat" />
                </div>
                <div class="field" style="grid-column:1 / -1;">
                  <label>GH_TOKEN (可选，GitHub Issue 同步建议配置)</label>
                  <input id="GH_TOKEN" type="password" value="${esc(c.GH_TOKEN || "")}" />
                </div>
              </div>
            </article>
          `,

          "step-feishu": `
            <article class="card">
              <h2>飞书账号映射</h2>
              <p class="hint">默认两套飞书应用：hot-search 负责群路由，ai-tech 负责情报类账号（可选）。</p>
              <div class="grid">
                <div class="field">
                  <label>FEISHU_HOT_ACCOUNT_ID</label>
                  <input id="FEISHU_HOT_ACCOUNT_ID" value="${esc(c.FEISHU_HOT_ACCOUNT_ID || "hot-search")}" />
                </div>
                <div class="field">
                  <label>FEISHU_HOT_BOT_NAME</label>
                  <input id="FEISHU_HOT_BOT_NAME" value="${esc(c.FEISHU_HOT_BOT_NAME || "小龙虾 1 号")}" />
                </div>
                <div class="field">
                  <label>FEISHU_HOT_APP_ID (必填)</label>
                  <input id="FEISHU_HOT_APP_ID" value="${esc(c.FEISHU_HOT_APP_ID || "")}" />
                </div>
                <div class="field">
                  <label>FEISHU_HOT_APP_SECRET (必填)</label>
                  <input id="FEISHU_HOT_APP_SECRET" type="password" value="${esc(c.FEISHU_HOT_APP_SECRET || "")}" />
                </div>
                <div class="field">
                  <label>FEISHU_AI_ACCOUNT_ID (可选)</label>
                  <input id="FEISHU_AI_ACCOUNT_ID" value="${esc(c.FEISHU_AI_ACCOUNT_ID || "ai-tech")}" />
                </div>
                <div class="field">
                  <label>FEISHU_AI_BOT_NAME (可选)</label>
                  <input id="FEISHU_AI_BOT_NAME" value="${esc(c.FEISHU_AI_BOT_NAME || "小龙虾 2 号")}" />
                </div>
                <div class="field">
                  <label>FEISHU_AI_APP_ID (可选)</label>
                  <input id="FEISHU_AI_APP_ID" value="${esc(c.FEISHU_AI_APP_ID || "")}" />
                </div>
                <div class="field">
                  <label>FEISHU_AI_APP_SECRET (可选)</label>
                  <input id="FEISHU_AI_APP_SECRET" type="password" value="${esc(c.FEISHU_AI_APP_SECRET || "")}" />
                </div>
              </div>
            </article>
          `,

          "step-run": `
            <article class="card split">
              <div>
                <h2>应用配置并重启</h2>
                <p class="hint">点击“应用并重启服务”后，会自动执行：<code>stop -> install -> start</code>。</p>
                <div id="taskTips" class="muted">等待操作...</div>
                <div style="margin-top:8px;">
                  <label>任务日志</label>
                  <textarea id="taskLog" readonly></textarea>
                </div>
              </div>
              <div>
                <h2>服务状态</h2>
                <div id="serviceList" class="service-list"></div>
              </div>
            </article>
          `,
        };

        const key = steps[state.stepIdx].id;
        byId("panel").innerHTML = panes[key] || "";

        if (key === "step-model") {
          const current = String(c.MODEL_PRIMARY || "").trim();
          const preset = Object.entries(modelPresets).find(([, v]) => v === current)?.[0] || (current ? "custom" : "keep");
          fillValue("MODEL_PRESET", preset);
          byId("MODEL_PRESET").addEventListener("change", () => {
            const p = getVal("MODEL_PRESET");
            if (p !== "custom") fillValue("MODEL_PRIMARY", modelPresets[p] || "");
          });
        }

        if (key === "step-run") {
          refreshServiceStatus();
        }
      }

      async function api(path, opts = {}) {
        const res = await fetch(path, {
          method: opts.method || "GET",
          headers: { "content-type": "application/json" },
          body: opts.body ? JSON.stringify(opts.body) : undefined,
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.ok === false) {
          throw new Error(data.error || `HTTP ${res.status}`);
        }
        return data;
      }

      async function loadConfig() {
        const data = await api("/api/config");
        state.config = data.config || {};
        setStatus("配置已加载", "ok");
      }

      async function saveConfig() {
        const cfg = collectForm();
        const miss = validateCore(cfg);
        if (miss.length > 0) {
          setStatus(`缺少必填: ${miss.join(", ")}`, "err");
          return;
        }
        await api("/api/config/save", { method: "POST", body: { config: cfg } });
        state.config = cfg;
        setStatus("已保存 .env", "ok");
      }

      async function startTask(path, body) {
        const data = await api(path, { method: "POST", body });
        state.taskId = data.taskId;
        setStatus(`任务启动: ${state.taskId}`, "warn");
        pollTask();
      }

      async function runApply() {
        const cfg = collectForm();
        const miss = validateCore(cfg);
        if (miss.length > 0) {
          setStatus(`缺少必填: ${miss.join(", ")}`, "err");
          return;
        }
        state.config = cfg;
        await startTask("/api/config/apply", { config: cfg });
      }

      async function runRestart() {
        await startTask("/api/service/restart", {});
      }

      async function pollTask() {
        if (!state.taskId) return;
        if (state.taskTimer) clearInterval(state.taskTimer);

        const run = async () => {
          try {
            const data = await api(`/api/task/${state.taskId}`);
            const task = data.task || {};
            const logs = Array.isArray(task.logs) ? task.logs : [];
            const logEl = byId("taskLog");
            const tipsEl = byId("taskTips");
            if (logEl) {
              logEl.value = logs.join("\n");
              logEl.scrollTop = logEl.scrollHeight;
            }
            if (tipsEl) {
              tipsEl.textContent = `任务 ${task.id || "-"} 状态: ${task.status || "-"}，开始: ${task.startedAt || "-"}`;
            }

            if (task.status === "running") {
              setStatus(`执行中: ${task.name || state.taskId}`, "warn");
            } else if (task.status === "success") {
              setStatus("任务完成", "ok");
              clearInterval(state.taskTimer);
              state.taskTimer = null;
              refreshServiceStatus();
            } else if (task.status === "failed") {
              setStatus("任务失败，请看日志", "err");
              clearInterval(state.taskTimer);
              state.taskTimer = null;
              refreshServiceStatus();
            }
          } catch (err) {
            setStatus(`拉取任务失败: ${err.message}`, "err");
          }
        };

        await run();
        state.taskTimer = setInterval(run, 1500);
      }

      async function refreshServiceStatus() {
        try {
          const data = await api("/api/service/status");
          const items = data.service?.services || [];
          const host = byId("serviceList");
          if (!host) return;
          host.innerHTML = items
            .map((s) => {
              const tag = s.running ? '<span class="status ok">running</span>' : '<span class="status err">stopped</span>';
              const pid = s.pid ? `PID ${s.pid}` : "PID -";
              return `<div class="svc"><div><b>${esc(s.name)}</b> ${tag}</div><div class="muted">${esc(pid)}</div></div>`;
            })
            .join("");
        } catch (err) {
          const host = byId("serviceList");
          if (host) host.innerHTML = `<div class="svc">读取失败: ${esc(err.message)}</div>`;
        }
      }

      function bindEvents() {
        byId("steps").addEventListener("click", (e) => {
          const target = e.target.closest(".step");
          if (!target) return;
          const idx = Number(target.dataset.idx);
          if (!Number.isFinite(idx)) return;
          state.stepIdx = idx;
          updateStepNav();
          renderPanel();
        });

        byId("btnPrev").addEventListener("click", () => {
          state.stepIdx = Math.max(0, state.stepIdx - 1);
          updateStepNav();
          renderPanel();
        });

        byId("btnNext").addEventListener("click", () => {
          state.stepIdx = Math.min(steps.length - 1, state.stepIdx + 1);
          updateStepNav();
          renderPanel();
        });

        byId("btnSave").addEventListener("click", async () => {
          try {
            await saveConfig();
          } catch (err) {
            setStatus(`保存失败: ${err.message}`, "err");
          }
        });

        byId("btnApply").addEventListener("click", async () => {
          try {
            await runApply();
          } catch (err) {
            setStatus(`应用失败: ${err.message}`, "err");
          }
        });

        byId("btnRestart").addEventListener("click", async () => {
          try {
            await runRestart();
          } catch (err) {
            setStatus(`重启失败: ${err.message}`, "err");
          }
        });

        byId("btnReloadStatus").addEventListener("click", refreshServiceStatus);
      }

      async function init() {
        updateStepNav();
        bindEvents();
        try {
          await loadConfig();
        } catch (err) {
          setStatus(`加载失败: ${err.message}`, "err");
        }
        renderPanel();
      }

      init();
    </script>
  </body>
</html>
